<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Navigator Pro | Visual Studio Security</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-green: #4ade80; --dark-bg: #0a0e1a; }
        html, body { height: 100%; margin: 0; background: var(--dark-bg); color: #f0f0f0; font-family: 'DM Sans', sans-serif; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .card { background: rgba(15,20,35,0.8); border: 1px solid rgba(74,222,128,0.15); border-radius: 12px; }
        .btn-primary { background: linear-gradient(135deg, #1a5c3a 0%, #2a7a4a 100%); border: 1px solid rgba(74,222,128,0.3); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,92,58,0.4); border-color: var(--primary-green); }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.6s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .severity-critical { color: #ef4444; background: rgba(239,68,68,0.1); }
        .severity-high { color: #f97316; background: rgba(249,115,22,0.1); }
    </style>
</head>

<body class="h-full flex flex-col">
    <header class="fade-in px-6 py-4 border-b border-white/10 glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-green-600 flex items-center justify-center">
                    <i data-lucide="shield-check" class="text-white"></i>
                </div>
                <div>
                    <h1 id="mainTitle" class="text-lg font-bold text-white leading-none">Security Navigator Pro</h1>
                    <p id="companyName" class="text-xs text-gray-400 mt-1">Visual Studio Security Engine</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="showScanModal()" class="btn-primary text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                    <i data-lucide="zap" size="16"></i> New Scan
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <section class="grid grid-cols-1 md:grid-cols-4 gap-4 fade-in">
                <div class="card p-5">
                    <div class="flex justify-between items-start text-gray-400 mb-2">
                        <span class="text-xs uppercase font-bold tracking-wider">Total Scans</span>
                        <i data-lucide="activity" size="16"></i>
                    </div>
                    <p class="text-3xl font-bold text-white" id="statTotalScans">0</p>
                </div>
                <div class="card p-5 border-red-500/20">
                    <div class="flex justify-between items-start text-gray-400 mb-2">
                        <span class="text-xs uppercase font-bold tracking-wider">Vulnerabilities</span>
                        <i data-lucide="alert-circle" size="16" class="text-red-400"></i>
                    </div>
                    <p class="text-3xl font-bold text-white" id="statVulnerabilities">0</p>
                    <p class="text-[10px] text-red-400 mt-1" id="statCritical">0 Critical Found</p>
                </div>
                <div class="card p-5 border-blue-500/20">
                    <div class="flex justify-between items-start text-gray-400 mb-2">
                        <span class="text-xs uppercase font-bold tracking-wider">Security Score</span>
                        <i data-lucide="shield" size="16" class="text-blue-400"></i>
                    </div>
                    <p class="text-3xl font-bold text-white">98<span class="text-sm text-gray-500">/100</span></p>
                </div>
                <div class="card p-5 border-green-500/20 text-center flex flex-col justify-center">
                    <span class="text-[10px] text-green-400 font-bold uppercase">Engine Status</span>
                    <p class="text-lg font-bold text-green-400">SYSTEM ONLINE</p>
                </div>
            </section>

            <section class="card overflow-hidden fade-in" style="animation-delay: 0.2s;">
                <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <h2 class="text-sm font-bold flex items-center gap-2">
                        <i data-lucide="list" size="16"></i> Recent Security Audits
                    </h2>
                    <button onclick="updateDashboard()" class="text-xs text-gray-400 hover:text-white flex items-center gap-1 transition">
                        <i data-lucide="refresh-cw" size="12"></i> Sync
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-500 bg-black/20">
                            <tr>
                                <th class="p-4 font-medium">Target URL</th>
                                <th class="p-4 font-medium">Type</th>
                                <th class="p-4 font-medium">Issues</th>
                                <th class="p-4 font-medium">Date</th>
                                <th class="p-4 font-medium text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="scansTableBody" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="scanModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="card p-6 w-full max-w-md shadow-2xl border-green-500/30">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-white">Config Audit Engine</h3>
                <button onclick="closeScanModal()" class="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Target URL</label>
                    <input type="url" id="scanUrl" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white outline-none focus:border-green-500 transition" placeholder="https://site-para-testar.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Audit Intensity</label>
                    <select id="scanType" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white outline-none">
                        <option value="basic">Express Scan (Fast)</option>
                        <option value="full">Deep Infrastructure (Slow)</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeScanModal()" class="flex-1 py-3 text-sm text-gray-400 hover:text-white transition">Cancel</button>
                    <button onclick="executeScan()" class="flex-1 btn-primary py-3 rounded-lg text-sm font-bold text-white">Start Engine</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 glass border-green-500/50 p-4 rounded-lg hidden shadow-2xl transition-all">
        <div class="flex items-center gap-3">
            <i data-lucide="terminal" size="18" class="text-green-400"></i>
            <p id="toastMessage" class="text-xs font-mono text-green-400"></p>
        </div>
    </div>

    <script>
        // --- CORE LOGIC ---
        function showScanModal() { document.getElementById('scanModal').style.display = 'flex'; }
        function closeScanModal() { document.getElementById('scanModal').style.display = 'none'; }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }

        async function executeScan() {
            const url = document.getElementById('scanUrl').value;
            const type = document.getElementById('scanType').value;

            if(!url.startsWith('http')) {
                showToast("Invalid Protocol: Use http/https");
                return;
            }

            showToast(`Initializing Scan: ${url}`);
            closeScanModal();

            try {
                // Simulação de resposta (Troque pelo fetch real do seu Backend se estiver rodando)
                const mockResult = {
                    url: url,
                    scanType: type,
                    vulnerabilityCount: Math.floor(Math.random() * 8),
                    severity: Math.random() > 0.7 ? 'critical' : 'high',
                    createdAt: new Date().toISOString()
                };

                // Aqui você chamaria o dataSdk.create(mockResult)
                console.log("Scan Data Generated:", mockResult);
                showToast("Audit successfully logged.");
                updateDashboard();
            } catch (e) {
                showToast("Connection Error with Python Backend.");
            }
        }

        // --- ANTI-INSPECTION (PROTECTION) ---
        const lockSystem = () => {
            document.body.innerHTML = `<div style="background:#000;color:red;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;text-align:center;">
                <h1 style="font-size:3rem;">SYSTEM LOCKED</h1>
                <p>Unauthorized inspection detected. Log sent to Visual Studio Security.</p>
                <button onclick="location.reload()" style="background:#222;color:#fff;border:1px solid #444;padding:10px 20px;margin-top:20px;cursor:pointer;">Retry Connection</button>
            </div>`;
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
                e.preventDefault();
                lockSystem();
            }
        });

        // Initialize Lucide
        lucide.createIcons();
    </script>
</body>
</html>
