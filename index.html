    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --critical: #d73a49;
            --success: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Status Bar com Link Interligado */
        .status-bar {
            background: #0d1117;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            color: var(--bg);
            background: var(--success);
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .nav-btn:hover { opacity: 0.8; }

        /* Layout Estrutural */
        .main-layout {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
        }

        .side-ad { flex: 0 0 160px; display: none; }
        @media (min-width: 1240px) { .side-ad { display: block; } }

        .content-area { flex: 1; max-width: 900px; }

        /* Componentes de UI */
        .intel-report {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .badge { background: var(--critical); color: #fff; padding: 4px 8px; font-family: 'JetBrains Mono'; font-size: 0.7rem; border-radius: 4px; }
        h1.report-title { font-family: 'JetBrains Mono'; font-size: 1.8rem; margin: 20px 0; color: #fff; }
        
        .report-content p { margin-bottom: 20px; color: #8b949e; text-align: justify; }
        .tool-list { margin: 25px 0; padding-left: 20px; border-left: 2px solid var(--accent); }
        .tool-item { margin-bottom: 15px; font-size: 0.9rem; }
        .tool-name { color: var(--accent); font-family: 'JetBrains Mono'; font-weight: bold; }

        .protection-box {
            margin-top: 40px;
            padding: 30px;
            background: rgba(63, 185, 80, 0.05);
            border: 1px solid var(--success);
            border-radius: 8px;
        }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); font-size: 0.8rem; color: #8b949e; margin-top: auto; }
    </style>
</head>
